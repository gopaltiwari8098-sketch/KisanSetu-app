<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandi Comparison - KisanSetu</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%BE%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<style>
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: var(--space-md);
  max-width: 480px;
  width: 90%;
  position: relative;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-close {
  position: absolute;
  top: var(--space-xs);
  right: var(--space-sm);
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: var(--color-text-muted);
}
.modal-close:hover { color: var(--color-danger); }
.modal-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  color: var(--color-primary-dark);
  margin-bottom: var(--space-xs);
}
.modal-meta {
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-bottom: var(--space-sm);
}
.modal-price {
  font-family: var(--font-mono);
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-primary-dark);
  margin-bottom: var(--space-sm);
}
.modal-trend-up { color: var(--color-success); }
.modal-trend-down { color: var(--color-danger); }
.mandi-card { cursor: pointer; }
.results-count {
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-bottom: var(--space-sm);
  font-family: var(--font-mono);
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar__logo">Kisan<span>Setu</span></a>
  <ul class="navbar__links">
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="mandi-comparison.html">Mandi Comparison</a></li>
    <li><a href="price-trends.html">Price Trends</a></li>
    <li><a href="schemes.html">Schemes</a></li>
  </ul>
  <a href="profile.html" class="navbar__cta">Profile</a>
  <button class="navbar__menu-toggle" aria-label="Menu">&#9776;</button>
</nav>

<section class="dashboard">
  <div class="container">
    <div class="dashboard__welcome">
      <p class="dashboard__greeting">Real-time mandi rates</p>
      <h1 class="dashboard__name">Mandi <span>Comparison</span></h1>
    </div>

    <div class="filter-bar">
      <select id="cropFilter">
        <option value="Wheat">Wheat / गेहूं</option>
        <option value="Rice">Rice / चावल</option>
        <option value="Onion">Onion / प्याज</option>
        <option value="Potato">Potato / आलू</option>
        <option value="Tomato">Tomato / टमाटर</option>
        <option value="Mustard">Mustard / सरसों</option>
        <option value="Gram">Gram / चना</option>
        <option value="Arhar Dal">Arhar Dal / अरहर दाल</option>
        <option value="Soybean">Soybean / सोयाबीन</option>
        <option value="Cotton">Cotton / कपास</option>
        <option value="Maize">Maize / मक्का</option>
        <option value="Garlic">Garlic / लहसुन</option>
        <option value="Ginger">Ginger / अदरक</option>
        <option value="Turmeric">Turmeric / हल्दी</option>
      </select>
      <select id="stateFilter">
          <option value="all">Saare states</option>
          <optgroup label="States">
          <option value="Andhra Pradesh">Andhra Pradesh</option>
          <option value="Arunachal Pradesh">Arunachal Pradesh</option>
          <option value="Assam">Assam</option>
          <option value="Bihar">Bihar</option>
          <option value="Chhattisgarh">Chhattisgarh</option>
          <option value="Goa">Goa</option>
          <option value="Gujarat">Gujarat</option>
          <option value="Haryana">Haryana</option>
          <option value="Himachal Pradesh">Himachal Pradesh</option>
          <option value="Jharkhand">Jharkhand</option>
          <option value="Karnataka">Karnataka</option>
          <option value="Kerala">Kerala</option>
          <option value="Madhya Pradesh">Madhya Pradesh</option>
          <option value="Maharashtra">Maharashtra</option>
          <option value="Manipur">Manipur</option>
          <option value="Meghalaya">Meghalaya</option>
          <option value="Mizoram">Mizoram</option>
          <option value="Nagaland">Nagaland</option>
          <option value="Odisha">Odisha</option>
          <option value="Punjab">Punjab</option>
          <option value="Rajasthan">Rajasthan</option>
          <option value="Sikkim">Sikkim</option>
          <option value="Tamil Nadu">Tamil Nadu</option>
          <option value="Telangana">Telangana</option>
          <option value="Tripura">Tripura</option>
          <option value="Uttar Pradesh">Uttar Pradesh</option>
          <option value="Uttarakhand">Uttarakhand</option>
          <option value="West Bengal">West Bengal</option>
          </optgroup>
          <optgroup label="Union Territories">
          <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
          <option value="Chandigarh">Chandigarh</option>
          <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli</option>
          <option value="Delhi">Delhi (NCT)</option>
          <option value="Jammu and Kashmir">Jammu and Kashmir</option>
          <option value="Ladakh">Ladakh</option>
          <option value="Lakshadweep">Lakshadweep</option>
          <option value="Puducherry">Puducherry</option>
          </optgroup>
      </select>
      <select id="sortFilter">
        <option value="price_desc">Sort: Highest price</option>
        <option value="price_asc">Sort: Lowest price</option>
      </select>
    </div>

    <p class="results-count" id="resultsCount">Loading...</p>

    <div class="mandi-grid" id="mandiSkeleton">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div class="mandi-grid" id="mandiGrid" style="display:none;"></div>
  </div>
</section>

<!-- Modal -->
<div class="modal-overlay" id="mandiModal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">&times;</button>
    <p class="modal-title" id="modalTitle">Mandi naam</p>
    <p class="modal-meta" id="modalMeta">District, State</p>
    <p class="modal-price" id="modalPrice">&#8377;0/q</p>
    <p id="modalTrend" style="font-family: var(--font-mono); font-size: 0.9rem; margin-bottom: var(--space-sm);"></p>
    <p style="font-size: 0.82rem; color: var(--color-text-muted);">Rates roz subah update hote hain. Actual mandi pe jaane se pehle confirm zaroor karein.</p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils/tokenStorage.js"></script>
<script src="js/utils/formatters.js"></script>
<script src="js/api/priceApi.js"></script>
<script src="js/components/renderNavbar.js"></script>
<script src="js/pages/mandiComparison.js"></script>
</body>
</html>
